name: Release Packages

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v1.2.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        env:
          TAG_INPUT: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          tag="${TAG_INPUT:-}"
          if [[ -z "$tag" ]]; then
            if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
              tag="${GITHUB_REF_NAME}"
            else
              echo "Release tag is required when this workflow is not triggered by a tag." >&2
              exit 1
            fi
          fi
          version="${tag#[vV]}"
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build unsigned macOS package
        run: bash publish/mac/publish-mac.sh --arch "${{ matrix.arch }}" --version "$PACKAGE_VERSION"

      - name: Validate app bundle
        run: |
          set -euo pipefail
          app_path="publish/output/AntBrowser.app"
          zip_path="$(ls -1 publish/output/AntBrowser-*-macos-${{ matrix.arch }}.zip | head -n 1)"
          echo "Validating: $app_path"
          test -x "$app_path/Contents/MacOS/ant-chrome"
          test -x "$app_path/Contents/MacOS/bin/xray"
          test -x "$app_path/Contents/MacOS/bin/sing-box"
          plutil -lint "$app_path/Contents/Info.plist"
          ditto -x -k "$zip_path" /tmp/ant-browser-macos-validate
          test -x "/tmp/ant-browser-macos-validate/AntBrowser.app/Contents/MacOS/ant-chrome"

      - name: Upload macOS release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-${{ matrix.arch }}
          path: publish/output/AntBrowser-*-macos-${{ matrix.arch }}.zip
          if-no-files-found: error

  linux:
    name: Build Linux ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        env:
          TAG_INPUT: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          tag="${TAG_INPUT:-}"
          if [[ -z "$tag" ]]; then
            if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
              tag="${GITHUB_REF_NAME}"
            else
              echo "Release tag is required when this workflow is not triggered by a tag." >&2
              exit 1
            fi
          fi
          version="${tag#[vV]}"
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            dpkg-dev \
            fakeroot \
            pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Linux packages
        run: bash publish/linux/publish-linux.sh --arch "${{ matrix.arch }}" --version "$PACKAGE_VERSION"

      - name: Validate deb package metadata
        run: |
          set -euo pipefail
          deb_file="$(ls -1 publish/output/*_${{ matrix.arch }}.deb | head -n 1)"
          tar_file="$(ls -1 publish/output/*-linux-${{ matrix.arch }}.tar.gz | head -n 1)"
          echo "Validating: $deb_file"
          dpkg-deb -I "$deb_file"
          dpkg-deb -c "$deb_file" >/dev/null
          tar -tzf "$tar_file" > /tmp/ant-browser-tar-list
          grep -q '^AntBrowser/' /tmp/ant-browser-tar-list

      - name: Upload Linux release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ matrix.arch }}
          path: |
            publish/output/*_${{ matrix.arch }}.deb
            publish/output/*-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  windows:
    name: Build Windows amd64
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        shell: bash
        env:
          TAG_INPUT: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          tag="${TAG_INPUT:-}"
          if [[ -z "$tag" ]]; then
            if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
              tag="${GITHUB_REF_NAME}"
            else
              echo "Release tag is required when this workflow is not triggered by a tag." >&2
              exit 1
            fi
          fi
          version="${tag#[vV]}"
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Add Go bin to PATH
        shell: pwsh
        run: |
          "$(go env GOPATH)\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build Windows packages
        shell: pwsh
        run: .\publish\windows\publish-windows.ps1 -Arch amd64 -Version "$env:PACKAGE_VERSION"

      - name: Validate Windows package
        shell: pwsh
        run: |
          $zip = Get-ChildItem publish/output/AntBrowser-*-windows-amd64.zip | Select-Object -First 1
          $setup = Get-ChildItem publish/output/AntBrowser-Setup-*.exe | Select-Object -First 1
          if (-not $zip) { throw "Windows zip artifact not found" }
          if (-not $setup) { throw "Windows setup artifact not found" }
          $dest = Join-Path $env:RUNNER_TEMP "ant-browser-windows-validate"
          Remove-Item $dest -Recurse -Force -ErrorAction SilentlyContinue
          Expand-Archive -Path $zip.FullName -DestinationPath $dest -Force
          foreach ($path in @(
            "AntBrowser/ant-chrome.exe",
            "AntBrowser/bin/xray.exe",
            "AntBrowser/bin/sing-box.exe",
            "AntBrowser/config.yaml"
          )) {
            if (-not (Test-Path (Join-Path $dest $path))) {
              throw "Missing file in Windows zip: $path"
            }
          }

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-amd64
          path: |
            publish/output/AntBrowser-*-windows-amd64.zip
            publish/output/AntBrowser-Setup-*.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs:
      - macos
      - linux
      - windows
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        env:
          TAG_INPUT: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          tag="${TAG_INPUT:-}"
          if [[ -z "$tag" ]]; then
            if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
              tag="${GITHUB_REF_NAME}"
            else
              echo "Release tag is required when this workflow is not triggered by a tag." >&2
              exit 1
            fi
          fi
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          if [[ "$tag" == *-* ]]; then
            echo "PRERELEASE_FLAG=--prerelease" >> "$GITHUB_ENV"
          else
            echo "PRERELEASE_FLAG=" >> "$GITHUB_ENV"
          fi

      - name: Generate release notes
        run: |
          set -euo pipefail
          git fetch --force --tags
          current_tag="$RELEASE_TAG"
          previous_tag="$(git describe --tags --abbrev=0 "${current_tag}^{commit}^" 2>/dev/null || true)"

          {
            echo "## Changes"
            echo
            if [[ -n "$previous_tag" ]]; then
              range="${previous_tag}..${current_tag}"
              echo "Since ${previous_tag}:"
              echo
            else
              range="${current_tag}"
            fi

            if git log --format='- %s (%h)' "$range" | grep -vE '^- (docs|test):' > /tmp/ant-browser-release-changes.md; then
              cat /tmp/ant-browser-release-changes.md
            else
              echo "- Release ${current_tag}"
            fi
          } > release-notes.md

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: List release assets
        run: |
          set -euo pipefail
          find release-assets -maxdepth 1 -type f -print | sort
          test "$(find release-assets -maxdepth 1 -type f | wc -l)" -gt 0

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "Ant Browser ${RELEASE_TAG}" \
              --notes-file release-notes.md \
              ${PRERELEASE_FLAG}
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --title "Ant Browser ${RELEASE_TAG}" \
              --notes-file release-notes.md \
              ${PRERELEASE_FLAG}
          fi
